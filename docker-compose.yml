services:
  php:
    image: yiisoftware/yii2-php:8.4-fpm
    container_name: yii2-php
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - .env:/var/www/.env
    depends_on:
      - db
  nginx:
    image: nginx:latest
    container_name: yii2-nginx
    ports:
      - "8087:8080"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www
    depends_on:
      - php

  db:
    image: mysql/mysql-server:8.0
    environment:
      MYSQL_DATABASE: "yii2_pet_project"
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_ROOT_HOST: "%"
    volumes:
      - ./docker/db/my.cnf:/etc/mysql/my.cnf:ro
      - ./storage/mysql:/var/lib/mysql
    ports:
      - "33067:3306"
    command: --innodb-use-native-aio=0

volumes:
  db_data: